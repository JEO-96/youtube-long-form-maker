# ═══ AI/테크 채널 설정 ═══

channel:
  id: "ai"
  name: "AI 실전연구소"
  niche: "ai_technology"
  language: "ko"
  tone: "실용적이고 흥미로운, 빠른 전개"
  target_audience: "20-40대 직장인, 프리랜서, AI 도구 활용 관심층"

# 채널 DNA
identity:
  unique_angle: "AI 도구를 실무에 즉시 적용하는 실전 가이드"
  narrative_style: "신기술 소개 → 실전 데모 → 활용 시나리오"
  forbidden_topics:
    - "AI 종말론/공포"
    - "근거 없는 미래 예측"
    - "특정 기업 비방"
  recurring_pattern: "3단 구조: 이런 게 가능해졌다 → 직접 써보니 → 이렇게 활용하세요"

content:
  preferred_topics:
    - "업무 자동화 도구"
    - "AI 글쓰기"
    - "AI 이미지/영상 생성"
    - "프롬프트 엔지니어링"
    - "AI 코딩 도구"
    - "생산성 향상 워크플로우"
    - "AI 도구 비교 리뷰"
    - "AI 뉴스/트렌드"
  target_duration_minutes: 12
  hook_style: "controversy"        # "이 도구 하나로 업무 시간 50% 줄였습니다"
  cta_style: "subscribe_and_next"

# AI 프로바이더 선택
providers:
  llm: "claude"
  tts: "elevenlabs"
  image_gen: "flux"
  video_gen: "grok"

# 비주얼 스타일
visual:
  primary_color: "#0D1B2A"
  secondary_color: "#1B263B"
  accent_color: "#00F5D4"
  font_family: "NanumGothicBold"
  thumbnail_template: "tech_default"
  background_style: "gradient_dark_tech"

# 업로드 설정
upload:
  category_id: "28"       # Science & Technology
  default_tags:
    - "AI"
    - "인공지능"
    - "자동화"
    - "생산성"
    - "AI도구"
    - "ChatGPT"
    - "Claude"
  privacy: "private"

# A/B 테스팅
ab_test:
  group: "default"
